services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/mysql-preflight.sh"]
    command: ["mysqld"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lms_db}
      MYSQL_USER: ${MYSQL_USER:-lms_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/entrypoint.sh:/usr/local/bin/mysql-preflight.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_PASSWORD mysqladmin ping -h localhost -u$$MYSQL_USER --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-init:
    build:
      context: ./backend
    restart: "no"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: mysql://${MYSQL_USER:-lms_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-lms_db}
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm run db:push && npm run db:seed"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: mysql://${MYSQL_USER:-lms_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-lms_db}
    depends_on:
      mysql:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  backend_uploads:
